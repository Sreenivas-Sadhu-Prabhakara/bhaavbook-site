<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="BhaavBook — quotation software that chases the quote to win the job. A KARYA studio build.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1425"/>
      <stop offset="1" stop-color="#2A1F44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9A5CFF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="12" fill="url(#accent)"/>

  <!-- Quote-slip mark -->
  <g transform="translate(96,150)">
    <rect width="150" height="190" rx="16" fill="url(#accent)"/>
    <rect x="34" y="30" width="82" height="130" rx="8" fill="#FAF7F2"/>
    <line x1="50" y1="58" x2="100" y2="58" stroke="#7C3AED" stroke-width="7" stroke-linecap="round"/>
    <line x1="50" y1="82" x2="100" y2="82" stroke="#E0D8CC" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="106" x2="84" y2="106" stroke="#E0D8CC" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="130" x2="100" y2="130" stroke="#7C3AED" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Eyebrow -->
  <text x="300" y="182" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" letter-spacing="4" font-weight="700" fill="#B79BFF">QUOTATION SOFTWARE FOR INDIAN TRADES</text>

  <!-- Product name -->
  <text x="298" y="300" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="128" font-weight="800" letter-spacing="-3" fill="#FFFFFF">BhaavBook</text>

  <!-- Tagline -->
  <text x="300" y="382" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="600" fill="#EDE7F6">Chase the quote, <tspan fill="#B79BFF" font-weight="800">win the job.</tspan></text>

  <!-- Sub-line -->
  <text x="300" y="446" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="500" fill="#9E96B0">Build it, track it, auto-nudge every estimate until it converts.</text>

  <!-- Footer / KARYA wordmark -->
  <line x1="96" y1="536" x2="1104" y2="536" stroke="#4A3D66" stroke-width="2"/>
  <text x="96" y="588" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="3" fill="#FFFFFF">KARYA</text>
  <text x="220" y="588" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="500" fill="#9E96B0"> studio build</text>
  <text x="1104" y="588" text-anchor="end" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" fill="#B79BFF">Subscription · pricing on discovery</text>
</svg>
